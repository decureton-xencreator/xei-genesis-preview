<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#050706">
  <meta name="description" content="XEI-001 — the private executive premiere that reveals Xen through a living BDC operating system.">
  <title>XEI-001 · Private Executive Premiere</title>
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>
  <div class="ambient" aria-hidden="true"><i></i><i></i><i></i></div>
  <div class="app">
    <header class="topbar">
      <div class="wordmark"><span class="xmark">X</span><span>XEN</span><small>PRIVATE EXECUTIVE PREMIERE</small></div>
      <div class="progress-wrap" aria-label="Experience progress"><div class="progress-track"><i id="progress"></i></div><span id="sceneCount" aria-live="polite"></span></div>
      <div class="truth-badge"><span></span> DEMONSTRATION ENVIRONMENT</div>
    </header>
    <main id="stage" tabindex="-1"></main>
    <nav class="dock" aria-label="Premiere controls">
      <button id="back" class="control" aria-label="Previous scene">←</button>
      <button id="home" class="control" aria-label="Return to opening">X</button>
      <button id="voice" class="control wide">Voice · On</button>
    </nav>
  </div>
  <noscript>This executive experience requires JavaScript.</noscript>
  <script type="module" src="src/app.js"></script>
</body>
</html>
