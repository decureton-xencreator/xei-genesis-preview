<!doctype html>
<html lang="en">
<head>
 <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow">
 <title>Xen · Private Choice Report</title>
 <style>
  :root{color-scheme:dark;font:16px/1.5 Inter,system-ui,sans-serif;background:#03080c;color:#eef9ff}*{box-sizing:border-box}body{margin:0;padding:32px;background:radial-gradient(circle at 50% 0,#0d2b3d 0,#03080c 48%);min-height:100vh}main{max-width:1100px;margin:auto}h1{font-size:clamp(2rem,6vw,4.8rem);line-height:.95;margin:.3em 0}p{color:#9db1bd}.panel{border:1px solid #2b637d;border-radius:22px;padding:24px;margin:22px 0;background:#071117;box-shadow:0 0 40px #00b7ff16}form{display:flex;gap:12px;flex-wrap:wrap}input,select,button{font:inherit;border-radius:12px;padding:12px 15px;border:1px solid #315467;background:#08151d;color:#eef9ff}input{flex:1;min-width:260px}button{cursor:pointer;background:#bdefff;color:#031018;font-weight:800}.status{min-height:24px;color:#72dcff}table{width:100%;border-collapse:collapse}th,td{text-align:left;padding:12px;border-bottom:1px solid #19303d}th{color:#72dcff;font-size:.75rem;letter-spacing:.12em}.empty{padding:30px;text-align:center}@media(max-width:700px){body{padding:18px}.table-wrap{overflow:auto}}
 </style>
</head>
<body><main>
 <small>OWNER VIEW · XEN COMMERCIAL GATEWAY</small><h1>Private choice report.</h1><p>Enter the owner credential for this session. It is used only for the request and is never stored by this page.</p>
 <section class="panel"><form id="auth"><input id="token" type="password" autocomplete="off" placeholder="Owner credential" required><button>Load report</button></form><p class="status" id="status" role="status"></p></section>
 <section class="panel"><h2>Create a private premiere link</h2><form id="invite"><select id="audience"><option value="ed">Ed</option><option value="kim">Kim</option><option value="ahmer">Ahmer</option></select><input id="label" maxlength="80" placeholder="Optional private label"><button>Create link</button></form><p class="status" id="inviteStatus" role="status"></p></section>
 <section class="panel table-wrap"><table><thead><tr><th>VIEWER</th><th>EVENT</th><th>SELECTED PATH</th><th>TIME</th></tr></thead><tbody id="events"><tr><td class="empty" colspan="4">Load the owner report to view activity.</td></tr></tbody></table></section>
 </main><script type="module">
 const config=await fetch('xen-choice-config.json',{cache:'no-store'}).then(r=>r.json()).catch(()=>({}));const base=String(config.endpoint||'').replace(/\/$/,'');
 const token=document.querySelector('#token');const status=document.querySelector('#status');const events=document.querySelector('#events');
 const auth=()=>({'authorization':`Bearer ${token.value}`,'content-type':'application/json'});
 document.querySelector('#auth').addEventListener('submit',async event=>{event.preventDefault();if(!base){status.textContent='Reporting Worker is not activated yet.';return}status.textContent='Loading…';const response=await fetch(`${base}/v1/admin/report`,{headers:auth()});if(!response.ok){status.textContent='Owner credential was not accepted.';return}const data=await response.json();events.innerHTML=data.events.length?data.events.map(row=>`<tr><td>${row.label||row.audience}</td><td>${row.event_type.replaceAll('_',' ')}</td><td>${row.selected_path||'—'}</td><td>${new Date(row.created_at+'Z').toLocaleString()}</td></tr>`).join(''):'<tr><td class="empty" colspan="4">No premiere activity has been recorded yet.</td></tr>';status.textContent=`Updated ${new Date(data.generated_at).toLocaleString()}.`});
 document.querySelector('#invite').addEventListener('submit',async event=>{event.preventDefault();const output=document.querySelector('#inviteStatus');if(!base){output.textContent='Reporting Worker is not activated yet.';return}const response=await fetch(`${base}/v1/admin/invites`,{method:'POST',headers:auth(),body:JSON.stringify({audience:document.querySelector('#audience').value,label:document.querySelector('#label').value})});if(!response.ok){output.textContent='Invite could not be created. Confirm the owner credential.';return}const data=await response.json();await navigator.clipboard.writeText(data.premiere_url);output.textContent=`Private ${data.audience} link created and copied.`});
 </script></body></html>
