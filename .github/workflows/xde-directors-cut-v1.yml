name: XDE Director's Cut Picture Lock

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  certify-directors-cut:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Validate runtime syntax
        run: node --check src/ed-premiere-clean-v1.js
      - name: Certify Director's Cut and production freeze
        run: node tests/xde-directors-cut-v1.mjs
      - name: Preserve branching and completion
        run: node tests/xde-branching-completion.mjs
      - name: Preserve compartment integrity
        run: node tests/xde-compartment-integrity.mjs
      - name: Preserve rollout contract
        run: node tests/xde-rollout-v1.mjs
      - name: Preserve XDE canon
        run: node tests/xde-canon.mjs
