name: Executive Symphony Continuity Validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'index.html'
      - 'src/**'
      - 'tests/validate.mjs'
      - '.github/workflows/executive-symphony-v4.yml'
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Validate active premiere syntax
        run: |
          node --check src/app-v6.js
          node --check src/cursor-v5.js
      - name: Validate Executive Symphony continuity
        run: node tests/validate.mjs