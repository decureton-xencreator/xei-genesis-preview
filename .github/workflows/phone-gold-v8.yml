name: Phone Gold Master V15
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  validate-phone:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: |
          node --check src/xvs-canonical-phone-v9.js
          node --check src/xvs-human-delivery-v10.js
          node --check src/phone-gold-runtime-v15.js
          node --check src/mobile-interaction-stage-v9.js
      - run: node tests/phone-gold-v8.mjs
