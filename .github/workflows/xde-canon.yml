name: XDE Executive Documentary Canon

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  certify-xde:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Validate documentary runtime syntax
        run: node --check src/ed-premiere-clean-v1.js
      - name: Certify XDE-001 through XDE-010
        run: node tests/xde-canon.mjs
      - name: Preserve clean production certification
        run: node tests/ed-premiere-clean-v1.mjs
