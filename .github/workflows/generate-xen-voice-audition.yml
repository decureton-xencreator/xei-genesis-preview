name: Generate Xen voice audition

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audition:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Generate mastered Xen audition
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/generate-xen-voice-audition.mjs
      - name: Verify mastered audition
        run: test -s assets/narration/xen-voice-audition-v2.mp3
      - name: Commit audition
        run: |
          git config user.name "xen-voice-master"
          git config user.email "actions@users.noreply.github.com"
          git add assets/narration/xen-voice-audition-v2.mp3
          if ! git diff --cached --quiet; then
            git commit -m "Generate Xen voice audition v2"
            git push
          fi
