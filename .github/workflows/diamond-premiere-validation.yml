name: Diamond Premiere Validation

on:
  pull_request:
    paths:
      - 'index.html'
      - 'src/**'
      - 'tests/validate.mjs'
      - '.github/workflows/diamond-premiere-validation.yml'
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'src/**'
      - 'tests/validate.mjs'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Validate JavaScript syntax
        run: |
          node --check src/app-v6.js
          node --check src/cursor-v5.js
      - name: Validate canonical narrative and experience contract
        run: node tests/validate.mjs