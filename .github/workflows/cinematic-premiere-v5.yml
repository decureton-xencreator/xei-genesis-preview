name: Cinematic Executive Premiere V6

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Validate active clean premiere
        run: |
          node --check src/ed-premiere-clean-v1.js
          node tests/ed-premiere-clean-v1.mjs
