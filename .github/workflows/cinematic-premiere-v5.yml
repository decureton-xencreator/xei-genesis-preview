name: Cinematic Executive Premiere V5

on:
  pull_request:
    branches: [main]
    paths:
      - 'index.html'
      - 'src/app-v5.js'
      - 'src/styles-v5.css'
      - 'src/cursor-v5.js'
      - 'tests/validate.mjs'
      - 'docs/XEI-001-CINEMATIC-STORYBOARD-V5.md'
      - '.github/workflows/cinematic-premiere-v5.yml'
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Validate cinematic runtime syntax
        run: |
          node --check src/app-v5.js
          node --check src/cursor-v5.js
      - name: Validate storyboard and family continuity
        run: node tests/validate.mjs